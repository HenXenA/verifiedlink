<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog Dark Elegant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}body {
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background: radial-gradient(900px 500px at 50% -5%, rgba(212,175,55,0.12), transparent 70%),
              linear-gradient(180deg, #121316 0%, #181a1f 45%, #101114 100%);
  font-family:'Inter', sans-serif;
}

.phone {
  width:360px;
  height:640px; /* 9:16 */
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(14px);
  background:rgba(10,10,10,0.75);
  border:1px solid rgba(255,255,255,0.08);
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.title {
  color:#f5f5f5;
  font-size:24px;
  font-family:'Playfair Display', serif;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:6px;
}

.subtitle {
  color:#aaa;
  font-size:12px;
  margin-bottom:24px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.list {
  width:100%;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item {
  text-decoration:none;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:16px;
  color:#eaeaea;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 8px rgba(212,175,55,0.08);
  transition:all 0.25s ease;
}

.item:hover {
  background:rgba(255,255,255,0.08);
  transform:translateY(-2px);
  border-color:rgba(212,175,55,0.3);
  box-shadow: 0 0 14px rgba(212,175,55,0.2);
}

.item:hover {
  background:rgba(255,255,255,0.08);
  transform:translateY(-2px);
  border-color:rgba(255,255,255,0.15);
}

.name {
  font-weight:500;
  font-size:15px;
  letter-spacing:0.3px;
}

.price {
  font-weight:500;
  font-size:14px;
  color:#d4af37; /* gold accent */
  font-family:'Playfair Display', serif;
}

  </style>
</head>
<body>  <div class="phone"><div class="title">Nama Toko</div>
<div class="subtitle">Catalog Produk</div>

<div class="list">

  <a href="https://id.shp.ee/Yrnf3Jav" class="item">
    <div class="name">Peci Hanasa</div>
    <div class="price">Rp20.000</div>
  </a>

  <a href="https://link-produk-2.com" class="item">
    <div class="name">Produk 2</div>
    <div class="price">Rp20K</div>
  </a>

  <a href="https://link-produk-3.com" class="item">
    <div class="name">Produk 3</div>
    <div class="price">Rp30K</div>
  </a>

</div>

  </div></body>
</html>
